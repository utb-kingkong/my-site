<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 채널 분석기</title>
    <style>
        body { background-color: #f3f4f6; text-align: center; font-family: sans-serif; padding: 50px; }
        /* 질문 상자 스타일 */
        input { padding: 10px; width: 300px; border-radius: 10px; border: 1px solid #ddd; }
        /* 시작 스위치 스타일 */
        button { padding: 10px 20px; background-color: #ff0000; color: white; border: none; border-radius: 10px; cursor: pointer; margin-left: 10px; font-weight: bold;}
        button:hover { background-color: #cc0000; }
        /* 결과 화면 스타일 */
        #result-box { margin-top: 30px; background: white; padding: 20px; border-radius: 15px; display: none; max-width: 400px; margin-left: auto; margin-right: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h1>🎬 유튜브 채널 분석 로봇</h1>
    <p>분석하고 싶은 유튜브 채널 주소를 넣어주세요!</p>

    <input type="text" id="channel-url" placeholder="https://www.youtube.com/@채널명">
    
    <button onclick="startAnalysis()">분석 시작!</button>

    <div id="result-box">
        <h3>📊 분석 결과 (가짜 데이터)</h3>
        <p><strong>채널명:</strong> <span id="res-name">대기 중...</span></p>
        <p><strong>구독자 수:</strong> <span id="res-subs">대기 중...</span></p>
        <p><strong>인기 포맷:</strong> <span id="res-format">대기 중...</span></p>
        <p><em>* 진짜 데이터는 나중에 API라는 걸 연결해야 해요!</em></p>
    </div>

    <script>
async function startAnalysis() {
    // 1. 열쇠와 입력값 가져오기
    const apiKey = "AIzaSyDG74UJMZ-y4F6OtCOl1F8969VQDmVP7RI";
    let channelInput = document.getElementById('channel-url').value;
    
    // 2. 주소에서 @ 뒷부분(핸들)만 쏙 뽑아내기
    let handle = "";
    if (channelInput.includes('@')) {
        handle = channelInput.split('@')[1].split('/')[0].split('?')[0];
    } else {
        alert("@채널명 형식으로 입력해주세요! (예: @자생법)");
        return;
    }

    try {
        // 3. 유튜브 서버에 데이터 요청하기
        const apiCallUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${handle}&key=${apiKey}`;
        const response = await fetch(apiCallUrl);
        const data = await response.json();

        // 4. 결과 화면에 보여주기
        if (data.items && data.items.length > 0) {
            const channel = data.items[0];
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('res-name').innerText = channel.snippet.title;
            
            // 구독자 수를 보기 좋게 콤마(,) 넣어주기
            const subCount = Number(channel.statistics.subscriberCount).toLocaleString();
            document.getElementById('res-subs').innerText = subCount + "명";
            
            document.getElementById('res-format').innerText = "최신 영상 분석 중... (API 연결 완료!)";
        } else {
            alert("채널을 찾을 수 없어요. 주소를 다시 확인해 주세요!");
        }
    } catch (error) {
        alert("에러가 발생했어요! API 키가 활성화될 때까지 5분 정도 걸릴 수 있습니다.");
    }
}
</script>

</body>
</html>
