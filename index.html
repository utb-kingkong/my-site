<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 채널 분석기</title>
    <style>
        body { background-color: #f3f4f6; text-align: center; font-family: sans-serif; padding: 50px; }
        /* 질문 상자 스타일 */
        input { padding: 10px; width: 300px; border-radius: 10px; border: 1px solid #ddd; }
        /* 시작 스위치 스타일 */
        button { padding: 10px 20px; background-color: #ff0000; color: white; border: none; border-radius: 10px; cursor: pointer; margin-left: 10px; font-weight: bold;}
        button:hover { background-color: #cc0000; }
        /* 결과 화면 스타일 */
        #result-box { margin-top: 30px; background: white; padding: 20px; border-radius: 15px; display: none; max-width: 400px; margin-left: auto; margin-right: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h1>🎬 유튜브 채널 분석 로봇</h1>
    <p>분석하고 싶은 유튜브 채널 주소를 넣어주세요!</p>

    <input type="text" id="channel-url" placeholder="https://www.youtube.com/@채널명">
    
    <button onclick="startAnalysis()">분석 시작!</button>

    <div id="result-box">
        <h3>📊 분석 결과 (가짜 데이터)</h3>
        <p><strong>채널명:</strong> <span id="res-name">대기 중...</span></p>
        <p><strong>구독자 수:</strong> <span id="res-subs">대기 중...</span></p>
        <p><strong>인기 포맷:</strong> <span id="res-format">대기 중...</span></p>
        <p><em>* 진짜 데이터는 나중에 API라는 걸 연결해야 해요!</em></p>
    </div>

    <script>
       async function startAnalysis() {
    const apiKey = "AIzaSyDG74UJMZ-y4F6OtCOl1F8969VQDmVP7RI";
    const channelUrl = document.getElementById('channel-url').value;
    
    // 주소에서 채널 ID만 뽑아내는 마법 (실제로는 더 복잡하지만 간단히!)
    // 예: @username 형식에서 정보를 가져오는 주소
    const apiCallUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=${channelUrl.split('@')[1]}&key=${apiKey}`;

    const response = await fetch(apiCallUrl);
    const data = await response.json();

    if (data.items) {
        const channel = data.items[0];
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('res-name').innerText = channel.snippet.title;
        document.getElementById('res-subs').innerText = channel.statistics.subscriberCount + "명";
        document.getElementById('res-format').innerText = "데이터 분석 중...";
    } else {
        alert("채널을 찾을 수 없어요. @아이디 형식을 확인해 주세요!");
    }
}
    </script>

</body>
</html>
